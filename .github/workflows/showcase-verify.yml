name: Showcase verify

# Reproduces every showcase submission from scratch: recompute the grade + SHA
# from the declared policy inputs, and assert the committed card SVG and
# SHOWCASE.md byte-match a clean regeneration. A faked grade or a hand-edited
# card fails here — the card is always CI-authoritative. No secrets required.

on:
  pull_request:
    paths:
      - 'showcase/**'
      - 'SHOWCASE.md'
      - 'audit/showcase/**'
      - 'audit/grade/share-card.ts'
      - 'audit/grade/conformance.ts'
  push:
    branches: [main]
    paths:
      - 'showcase/**'
      - 'SHOWCASE.md'
      - 'audit/showcase/**'

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      # The audit workspace imports the built `standdown` package via file:..
      - run: bun run build
      - name: Verify showcase submissions
        run: cd audit && npm install && npm run showcase:verify
