name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.5.1
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      # The audit harness is a separate workspace that imports the built
      # `standdown` package via file:.. — run its suite after the build.
      - name: Audit harness tests
        run: cd audit && npm install && npm test
      - run: bun run policies-cite-check
